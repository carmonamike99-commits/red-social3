<!DOCTYPE html>
<html>
<head>
  <title>Mi Red Social</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f0f0f0;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    #feed div {
      background: white;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>📱 Mi Red Social</h1>

<!-- LOGIN -->
<div id="login">
  <input type="email" id="email" placeholder="Correo"><br>
  <input type="password" id="password" placeholder="Contraseña"><br>
  <button onclick="register()">Registrarse</button>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h3 id="userEmail"></h3>

  <input type="text" id="postInput" placeholder="¿Qué estás pensando?">
  <button onclick="addPost()">Publicar</button>

  <div id="feed"></div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ⚠️ CAMBIA ESTO CON TUS DATOS
const firebaseConfig = {
  apiKey: "AIzaSyCQrG3rtIK_L1DSr4ungpCjQ3bm-RYJEgY",
  authDomain: "red-social-clase.firebaseapp.com",
  projectId: "red-social-clase"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// REGISTRAR
window.register = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("Cuenta creada 😎"))
    .catch(err => alert(err.message));
}

// LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(user => {
      document.getElementById("login").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("userEmail").innerText = user.user.email;
      loadPosts();
    })
    .catch(err => alert(err.message));
}

// PUBLICAR
window.addPost = async function () {
  const text = document.getElementById("postInput").value;

  if (text === "") return;

  await addDoc(collection(db, "posts"), {
    text: text
  });

  document.getElementById("postInput").value = "";
  loadPosts();
}

// VER POSTS
async function loadPosts() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "posts"));

  querySnapshot.forEach((doc) => {
    const div = document.createElement("div");
    div.innerHTML = `<p>${doc.data().text}</p>`;
    feed.appendChild(div);
  });
}
</script>

</body>
</html>
